# install tmux plugin manager
setenv -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.tmux/plugins/'
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
    ~/.tmux/plugins/tpm/bin/install_plugins'"

# plugins
set -g @plugin 'tmux-plugins/tpm'

# マウスモードの有効化
set -g mouse on

# Copy Mode
# 通常クリックは pane 切り替えに使いたいので、通常ドラッグでは copy-mode に入らない。
# 文字選択を始めたいときだけ Option/Alt+ドラッグで copy-mode に入る。
unbind-key -n MouseDrag1Pane
bind-key -n M-MouseDrag1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -M'

# copy-mode に入った後は、通常ドラッグでも Option/Alt+ドラッグでも選択開始できる。
bind-key -T copy-mode M-MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind-key -T copy-mode-vi M-MouseDrag1Pane select-pane \; send-keys -X begin-selection

# ドラッグ終了時は選択範囲をコピーするが、copy-mode は抜けない。
# スクロール経由で入った copy-mode と、Option/Alt+ドラッグ経由の copy-mode の両方で同じ動きにする。
unbind-key -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode M-MouseDragEnd1Pane send-keys -X copy-selection-no-clear
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi M-MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# copy-mode 中のキーボード操作。
# C-w/M-w はコピーして終了、C-y/M-y はコピーしてその場に残る。
# copy-command は空にして、pbcopy など特定 OS 依存の経路を使わない。
set -s copy-command ''
unbind-key -T copy-mode C-w
bind-key -T copy-mode C-w send-keys -X copy-selection-and-cancel
unbind-key -T copy-mode M-w
bind-key -T copy-mode M-w send-keys -X copy-selection-and-cancel
bind-key -T copy-mode C-y send-keys -X copy-selection-no-clear
bind-key -T copy-mode M-y send-keys -X copy-selection-no-clear
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# 5000行まで保持
set-option -g history-limit 5000

# 256色のサポート
set -g default-terminal "screen-256color"

# 設定ファイルの場所は各自に合わせて書き換え
bind-key r source-file ~/.tmux.conf \; display-message "Reload Config!!"

# ステータスバー右側のクリック領域でウィンドウを追加・削除する。
# user range 外のクリックは既定どおり switch-client に流す。
unbind-key -T root MouseDown1Status
bind-key -T root MouseDown1Status if-shell -F '#{==:#{mouse_status_range},add}' 'new-window' 'if-shell -F "#{==:#{mouse_status_range},del}" "confirm-before -p \"Kill window #I:#W? (y/n)\" kill-window" "switch-client -t ="'

# ペインをダブルクリックしたらズーム切り替え
bind-key -n DoubleClick1Pane resize-pane -Z

# UI ルール
# ステータスバーや pane border に表示する文字列は、原則として直接書かず
# @sl_* / @sr_* / @pb_* のような部品変数に切り出してから組み立てる。
# こうしておくと、表示順の変更やセグメントの追加削除がしやすい。

# ペイン枠の表示を上に出す
set -g pane-border-status top
# アクティブ枠の見た目
set -g pane-active-border-style 'fg=green'
# 非アクティブ枠の見た目
set -g pane-border-style 'fg=colour240'
set -g @pb_prefix '#{?pane_active,#[bold fg=green],#[fg=white]}#{?window_zoomed_flag,[ZOOM] ,}'
set -g @pb_index_active '#[fg=white,bg=green,bold] '
set -g @pb_index_inactive '#[fg=white,bg=colour246,bold] '
set -g @pb_path ' #[fg=colour250]#{b:pane_current_path}'
set -g @pb_mode ' #[fg=yellow,bold][#{pane_mode}]'
set -g @pb_format '#{E:@pb_prefix}#{?pane_active,#{E:@pb_index_active},#{E:@pb_index_inactive}}#{pane_index} #[default]#{E:@pb_path}#{?pane_in_mode,#{E:@pb_mode},}#[default]'
set -g pane-border-format "#{E:@pb_format}"

# 非アクティブ pane の通常文字だけ少し落としてみる。
# アプリ側が明示色を出す箇所には効きにくい。
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=default'

# ステータスバーのカスタマイズ
set -g status-style bg=black,fg=white
# 左側は git branch と worktree 名を、淡い青から緑の文字色で表示する。
set -g @sl_git_icon '#[fg=colour153,bold] 󰊢 '
set -g @sl_git_branch "#(cd '#{pane_current_path}' 2>/dev/null && branch=\$(git branch --show-current 2>/dev/null) && [ -n \"\$branch\" ] && if [ -n \"\$(git status --porcelain 2>/dev/null)\" ]; then printf '%%s*' \"\$branch\"; else printf '%%s' \"\$branch\"; fi)"
set -g @sl_worktree_icon '#[fg=colour193,bold]  '
set -g @sl_git_worktree "#(cd '#{pane_current_path}' 2>/dev/null && git rev-parse --show-toplevel 2>/dev/null | xargs basename)"
set -g @sl_git_branch_style '#[fg=colour153,bold] '
set -g @sl_git_worktree_style '#[fg=colour193,bold] '
set -g status-left "#{E:@sl_git_icon}#{E:@sl_git_branch_style}#{E:@sl_git_branch} #[default]#{E:@sl_worktree_icon}#{E:@sl_git_worktree_style}#{E:@sl_git_worktree} #[default]"
set -g @sr_add_btn '#[range=user|add fg=black bg=green bold]  󰐕 #[norange]'
set -g @sr_del_btn '#[range=user|del fg=black bg=yellow bold]  󰆴 #[norange]'
set -g @sr_load '#[fg=green]#(cut -d " " -f 1-3 /proc/loadavg)#[default]'
set -g status-right "#{E:@sr_add_btn} #{E:@sr_del_btn} #{E:@sr_load}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
