# マウスモードの有効化
set -g mouse on

# 256色のサポート
set -g default-terminal "screen-256color"

# ペインをダブルクリックしたらズーム切り替え
bind-key -n DoubleClick1Pane resize-pane -Z

# ペイン枠の表示を上に出す
set -g pane-border-status top
# 通常の枠
set -g pane-border-format ' #{pane_index} #{pane_current_command} '
# アクティブ枠の見た目
set -g pane-active-border-style 'fg=green'
# アクティブペインの枠に ZOOM 表示
set -g pane-border-format '#{?pane_active,#[bold]#{?window_zoomed_flag,[ZOOM] ,}#[default],}#{pane_index} #{pane_current_command}'

# ステータスバーのカスタマイズ
set -g status-style bg=black,fg=white
set -g status-left "#[fg=green]#H #[fg=black]• #[fg=green]#(uname -r | cut -c 1-6)#[default]"
set -g status-right "#[fg=green]#(cut -d ' ' -f 1-3 /proc/loadavg)#[default]"