# install tmux plugin manager
setenv -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.tmux/plugins/'
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
    ~/.tmux/plugins/tpm/bin/install_plugins'"

# plugins
set -g @plugin 'tmux-plugins/tpm'

# マウスモードの有効化
set -g mouse on

# 通常ペインでもドラッグ開始時に copy-mode に入り、そのまま選択できるようにする。
# これで「先にスクロールして copy-mode に入る」手間を減らす。
bind-key -n MouseDrag1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -M'

# ドラッグ選択の終了時にコピーしても copy-mode は維持する。
unbind-key -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear

# 5000行まで保持
set-option -g history-limit 5000

# 256色のサポート
set -g default-terminal "screen-256color"

# 設定ファイルの場所は各自に合わせて書き換え
bind-key r source-file ~/.tmux.conf \; display-message "Reload Config!!"

# ペインをダブルクリックしたらズーム切り替え
bind-key -n DoubleClick1Pane resize-pane -Z

# ペイン枠の表示を上に出す
set -g pane-border-status top
# アクティブ枠の見た目
set -g pane-active-border-style 'fg=green'
# 非アクティブ枠の見た目
set -g pane-border-style 'fg=colour240'
# pane title は外部プログラム側の動的表示に使い、git 情報は zsh 側が @git_info に入れる。
# zsh 関数が未定義か git 管理外なら @git_info は空になる。
set -g pane-border-format '#{?pane_active,#[bold fg=green],#[fg=white]}#{?window_zoomed_flag,[ZOOM] ,}#P #[fg=colour250]#{b:pane_current_path}#[default]#{?pane_in_mode, #[fg=yellow][copy],}#{?pane_active, #{pane_title}#{@git_info},}'

# ステータスバーのカスタマイズ
set -g status-style bg=black,fg=white
# tmux2k が読み込まれるまでは従来の左表示を使い、読み込み後は left-plugins が反映される。
set -g status-left "#[fg=green]#H #[fg=black]• #[fg=green]#(uname -r | cut -c 1-6)#[default]"
set -g status-right "#[fg=green]#(cut -d ' ' -f 1-3 /proc/loadavg)#[default]"

# アクティブペインの cwd が git 管理下なら現在ブランチを左側に表示する。
set -g status-left "#[fg=green]#H #[fg=black]• #[fg=green]#(uname -r | cut -c 1-6)#[fg=black]• #[fg=green]#(cd '#{pane_current_path}' 2>/dev/null && git branch --show-current 2>/dev/null)#[default]"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
