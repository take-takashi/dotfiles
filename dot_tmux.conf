# マウスモードの有効化
set -g mouse on

# 5000行まで保持
set-option -g history-limit 5000

# 256色のサポート
set -g default-terminal "screen-256color"

# 設定ファイルの場所は各自に合わせて書き換え
bind-key r source-file ~/.tmux.conf \; display-message "Reload Config!!"

# ペインをダブルクリックしたらズーム切り替え
bind-key -n DoubleClick1Pane resize-pane -Z

# ペイン枠の表示を上に出す
set -g pane-border-status top
# アクティブ枠の見た目
set -g pane-active-border-style 'fg=green'
# 非アクティブ枠の見た目
set -g pane-border-style 'fg=colour240'
# pane title は zsh 側の外部関数で更新する。関数が未定義か git 管理外なら pane_title は空になる。
set -g pane-border-format '#{?pane_active,#[bold fg=green],#[fg=white]}#{?window_zoomed_flag,[ZOOM] ,}#P #[fg=colour250]#{b:pane_current_path}#[default]#{?pane_in_mode, #[fg=yellow][copy],}#{?pane_active, #{pane_title},}'

# ステータスバーのカスタマイズ
set -g status-style bg=black,fg=white
set -g status-left "#[fg=green]#H #[fg=black]• #[fg=green]#(uname -r | cut -c 1-6)#[default]"
set -g status-right "#[fg=green]#(cut -d ' ' -f 1-3 /proc/loadavg)#[default]"
