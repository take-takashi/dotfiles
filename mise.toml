[tasks."tmux-which-key:build"]
description = "Build tmux-which-key init.tmux from config.yaml"
run = '''
set -eu

repo_root="$(git rev-parse --show-toplevel)"
plugin_dir="${HOME}/.tmux/plugins/tmux-which-key"
config_file="${repo_root}/dot_tmux/plugins/tmux-which-key/config.yaml"
output_file="${repo_root}/dot_tmux/plugins/tmux-which-key/plugin/init.tmux"

if [ ! -d "${plugin_dir}" ]; then
  git clone --recursive https://github.com/alexwforsythe/tmux-which-key "${plugin_dir}"
fi

mkdir -p "$(dirname "${output_file}")"
python3 "${plugin_dir}/plugin/build.py" "${config_file}" "${output_file}"

tmp_file="$(mktemp)"
awk '
  !done && $0 == "\"display-menu \\" {
    sub("display-menu", "display-menu -OM")
    done = 1
  }
  { print }
' "${output_file}" > "${tmp_file}"
mv "${tmp_file}" "${output_file}"
'''
